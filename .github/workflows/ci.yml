name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short || echo "No tests defined yet"

      - name: Lint check
        run: |
          pip install flake8
          flake8 --max-line-length=120 --ignore=E501,W503 agent_core.py main.py mini_ultra_launch.py || true

      - name: Import check
        run: |
          python -c "from agent_core import MiniUltraAgent; print('Agent import OK')"
          python -c "from utils.config_loader import load_config; print('Config import OK')"
          python -c "from memory.memory_store import MemoryStore; print('Memory import OK')"
