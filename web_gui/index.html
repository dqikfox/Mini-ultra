<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Ultra Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a2e;
            --accent: #00f0ff;
            --accent-dim: #00a0aa;
            --accent-glow: rgba(0, 240, 255, 0.15);
            --text: #e0e0e0;
            --text-dim: #888;
            --error: #ff4444;
            --success: #00ff88;
            --user-msg: #1e3a5f;
            --agent-msg: #1a1a2e;
            --border: #2a2a3e;
        }

        body {
            font-family: 'Segoe UI', 'SF Pro', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #0066ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            color: #000;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        .header .status {
            font-size: 12px;
            color: var(--text-dim);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        .status-dot.offline { background: var(--error); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .header-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-track { background: var(--bg-primary); }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border: 1px solid #2a5a8f;
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--agent-msg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            padding: 4px 12px;
        }

        .message.error {
            border-color: var(--error);
            color: var(--error);
        }

        .message pre {
            background: #000;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 13px;
        }

        .message code {
            background: rgba(0, 240, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent-dim);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 12px 16px;
            font-size: 14px;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
        }

        #messageInput::placeholder { color: var(--text-dim); }

        .send-btn {
            background: linear-gradient(135deg, var(--accent), #0066ff);
            border: none;
            color: #000;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Sidebar / Info Panel */
        .info-panel {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            width: 320px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
        }

        .info-panel.open { display: block; }

        .info-panel h3 {
            color: var(--accent);
            margin-bottom: 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item {
            background: var(--bg-tertiary);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .info-item .label { color: var(--text-dim); font-size: 11px; }
        .info-item .value { color: var(--text); margin-top: 2px; }

        /* Welcome screen */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .welcome h2 {
            color: var(--accent);
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome p { margin-bottom: 20px; }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .quick-action {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .quick-action:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .message { max-width: 90%; }
            .header-right { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="logo">MU</div>
            <div>
                <h1>Mini-Ultra</h1>
                <div class="status">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" onclick="resetConversation()">New Chat</button>
            <button class="header-btn" onclick="toggleInfo()">Info</button>
            <button class="header-btn" onclick="runDiagnosis()">Diagnose</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h2>Mini-Ultra Agent</h2>
            <p>Lightweight AI assistant with tools, memory, and more.</p>
            <div class="quick-actions">
                <div class="quick-action" onclick="sendQuick('What tools do you have?')">Available Tools</div>
                <div class="quick-action" onclick="sendQuick('Run a system health check')">Health Check</div>
                <div class="quick-action" onclick="sendQuick('Search the web for latest AI news')">Web Search</div>
                <div class="quick-action" onclick="sendQuick('Show system information')">System Info</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Type a message..." rows="1"
                      onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
    </div>

    <div class="info-panel" id="infoPanel">
        <h3>Agent Info</h3>
        <div id="infoContent">Loading...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
